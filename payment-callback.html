<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecemiko — Ödeme Sonucu</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #070709;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .status-container {
            text-align: center;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            background: #121215;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 340px;
            width: 85%;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            transform: scale(0.95);
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes popIn {
            to { transform: scale(1); }
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.03);
            border-top-color: #d946ef;
            border-left-color: #4f46e5;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            margin: 0 auto 1.5rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
        }
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
        h3 { 
            margin: 0 0 0.5rem; 
            font-size: 1.25rem;
            font-weight: 700; 
            letter-spacing: -0.01em;
        }
        p { 
            color: #a1a1aa; 
            font-size: 0.85rem; 
            margin: 0; 
            line-height: 1.5;
        }
        .icon-success {
            color: #10b981;
            font-size: 3rem;
            margin-bottom: 1rem;
            display: none;
        }
        .icon-error {
            color: #ef4444;
            font-size: 3rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="spinner" id="spinner"></div>
        <div class="icon-success" id="success-icon">✓</div>
        <div class="icon-error" id="error-icon">✕</div>
        <h3 id="status-title">İşleniyor...</h3>
        <p id="status-desc">Güvenli ödeme durumunuz doğrulanıyor, lütfen bekleyin.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status') || 'success'; 

        setTimeout(() => {
            const spinner = document.getElementById('spinner');
            const successIcon = document.getElementById('success-icon');
            const errorIcon = document.getElementById('error-icon');
            const title = document.getElementById('status-title');
            const desc = document.getElementById('status-desc');

            spinner.style.display = 'none';

            if (status === 'success') {
                successIcon.style.display = 'block';
                title.textContent = 'Başarılı!';
                title.style.color = '#10b981';
                desc.textContent = 'Ödemeniz başarıyla doğrulandı. Yönlendiriliyorsunuz...';
                window.parent.postMessage({ type: 'shopier-payment', status: 'success' }, '*');
            } else {
                errorIcon.style.display = 'block';
                title.textContent = 'Ödeme Başarısız';
                title.style.color = '#ef4444';
                desc.textContent = 'Ödeme işlemi iptal edildi veya başarısız oldu.';
                window.parent.postMessage({ type: 'shopier-payment', status: 'fail' }, '*');
            }
        }, 1500);
    </script>
</body>
</html>
